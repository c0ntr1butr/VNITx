name: vnit_x_app
description: VNITx Multimodal Security Dashboard - Mobile App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # File Handling
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  mime: ^1.0.5

  # Audio
  record: ^6.2.0
  audioplayers: ^6.1.0

  # Video
  video_player: ^2.9.2

  # Permissions
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.69.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
